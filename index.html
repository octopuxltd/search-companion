<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search sidebar</title>
  <link rel="icon" href="icon.png" />
  <style>
    :root { color-scheme: light dark; --bg: #fff; --fg: #1a1a1a; --accent: #1a73e8; }
    @media (prefers-color-scheme: dark) { :root { --bg: #14141a; --fg: #f5f5f5; --accent: #8ab4f8; } }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    .install { display: inline-flex; align-items: center; padding: 16px 28px; font-size: 16px; font-weight: 600; color: #fff; background: var(--accent); border-radius: 8px; text-decoration: none; }
    .install:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <a class="install" href="search-companion-1.0.3.xpi">Install the Search Sidebar extension</a>
</body>
</html>
